<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourseSim – Academic History</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hist-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px 24px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }
    .hist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .hist-year {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 800;
      color: #e2e8f0;
      margin-right: 10px;
    }
    .hist-sem {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .hist-summary { display: flex; gap: 10px; flex-wrap: wrap; }
    .hs-item {
      font-size: 0.78rem;
      font-family: var(--font-head);
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .hs-pass { background: rgba(34,197,94,0.15);  color: #86efac; }
    .hs-fail { background: rgba(239,68,68,0.15);  color: #fca5a5; }
    .hs-pend { background: rgba(234,179,8,0.15);  color: #fde047; }

    .hist-table {
      width: 100%; border-collapse: collapse; font-size: 0.86rem;
    }
    .hist-table th {
      text-align: left; padding: 8px 12px;
      font-family: var(--font-head); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    .hist-table td {
      padding: 10px 12px; color: #cbd5e1;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .hist-table tr:last-child td { border-bottom: none; }
    .hist-table tr:hover td { background: rgba(255,255,255,0.02); }
    .ht-code  { font-family: var(--font-head); font-weight: 700; color: #e2e8f0; }
    .ht-grade { font-family: var(--font-head); font-weight: 700; color: #93c5fd; }

    .grade-status {
      display: inline-block; font-size: 0.72rem;
      font-family: var(--font-head); font-weight: 700;
      padding: 2px 9px; border-radius: 20px; letter-spacing: 0.3px;
    }
    .gs-passed  { background: rgba(34,197,94,0.18);  color: #86efac; }
    .gs-failed  { background: rgba(239,68,68,0.18);  color: #fca5a5; }
    .gs-pending { background: rgba(234,179,8,0.18);  color: #fde047; }
    .dropped-tag {
      font-size: 0.68rem; background: rgba(100,116,139,0.2);
      color: #94a3b8; padding: 1px 6px; border-radius: 4px; margin-left: 4px;
    }

    @media (max-width: 640px) {
      .hist-table th:nth-child(2), .hist-table td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="logo">CS</div>
          <div><h1>CourseSim</h1><p>Student Portal</p></div>
        </div>
        <nav class="nav">
          <a id="navLogout" href="index.html">Login</a>
          <a href="courses.html">Courses</a>
          <a href="my-enrollments.html">My Enrollments</a>
          <a href="my-requests.html">My Requests</a>
          <a class="active" href="academic-history.html">Academic History</a>
        </nav>
      </div>
      <div class="user-card">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div>
          <h3 id="sidebarName">Student</h3>
          <p  id="sidebarId">ID</p>
          <span class="role-pill student" id="sidebarRole"></span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="hero">
        <h2>Academic History</h2>
        <p>Your complete enrollment record grouped by school year and semester.</p>
      </header>
      <div id="acadHistory"></div>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    (function() {
      const user = getCurrentUser();
      if (!user || user.role !== "student") { window.location.href = "index.html"; return; }
      document.getElementById("sidebarRole").className = "role-pill student";
    })();
  </script>
</body>
</html>
